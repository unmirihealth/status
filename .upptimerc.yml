# UNMIRI status page (Upptime) configuration.
#
# This file is NOT used by the unmiri.com app. It is the config for a
# SEPARATE public GitHub repo (suggested: github.com/<your-org>/status)
# created from the Upptime template (https://github.com/upptime/upptime).
#
# Setup is in docs/status-page/SETUP.md. Copy this file's contents into
# the `.upptimerc.yml` at the ROOT of that status repo, replace
# <your-github-username-or-org>, commit, and Upptime's GitHub Actions
# do the rest (checks every 5 min, history in git, static page on
# GitHub Pages). No server, no database, no PHI. The status page lives
# on GitHub infra so it survives an AWS/Vercel outage.

owner: unmirihealth # GitHub org/user that owns the status repo
repo: status # name of the status repo

sites:
  - name: API (api.unmiri.com)
    url: https://api.unmiri.com/healthz
  - name: API readiness
    url: https://api.unmiri.com/readyz
  - name: App (app.unmiri.com)
    url: https://app.unmiri.com
  - name: Marketing site (unmiri.com)
    url: https://unmiri.com

status-website:
  cname: status.unmiri.com # remove this line until DNS is set up, or it 404s
  name: UNMIRI Status
  introTitle: "UNMIRI Service Status"
  introMessage: "Live availability of UNMIRI's API, app, and marketing site. Checks run every 5 minutes from GitHub's infrastructure, independent of UNMIRI's hosting."
  navbar:
    - title: Status
      href: /
    - title: UNMIRI
      href: https://unmiri.com

# Check cadence and notification behavior (sane defaults).
delay: 0
assignees:
  - <your-github-username-or-org>
